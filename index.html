<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Entrenamiento La Vista</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

:root {
  --bg: #f7f5f0;
  --card: #ffffff;
  --text: #1a1a1a;
  --muted: #888;
  --border: #e8e4dc;
  --accent: #1a1a1a;
  --pass: #16a34a;
  --pass-bg: #f0fdf4;
  --fail: #ca8a04;
  --fail-bg: #fefce8;
  --scenario-bg: #1a1a1a;
  --scenario-text: #ffffff;
  --pill-bg: #e8e4dc;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

body {
  background: var(--bg);
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  display: flex;
  flex-direction: column;
  height: 100%;
}

/* ── Header ── */
.header {
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  flex-shrink: 0;
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}

.header-title {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: var(--muted);
}

.scenario-pill {
  background: var(--pill-bg);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
}

/* Progress dots */
.progress-dots {
  display: flex;
  gap: 6px;
  align-items: center;
}

.pdot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--border);
  transition: all 0.3s ease;
}

.pdot.done { background: var(--pass); }
.pdot.active { background: var(--accent); transform: scale(1.3); }

/* ── Main content ── */
.main {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* ── Cards ── */
.scenario-card {
  background: var(--scenario-bg);
  color: var(--scenario-text);
  border-radius: 16px;
  padding: 20px;
  animation: slideIn 0.3s ease;
}

.scenario-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  opacity: 0.5;
  margin-bottom: 10px;
  font-family: 'DM Mono', monospace;
}

.scenario-text {
  font-size: 15px;
  line-height: 1.6;
  font-weight: 500;
}

.feedback-card {
  border-radius: 14px;
  padding: 16px 18px;
  animation: slideIn 0.3s ease;
  border: 1.5px solid;
}

.feedback-card.pass {
  background: var(--pass-bg);
  border-color: #86efac;
}

.feedback-card.fail {
  background: var(--fail-bg);
  border-color: #fde68a;
}

.feedback-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 6px;
  font-family: 'DM Mono', monospace;
}

.feedback-card.pass .feedback-label { color: var(--pass); }
.feedback-card.fail .feedback-label { color: var(--fail); }

.feedback-text {
  font-size: 14px;
  line-height: 1.6;
  color: var(--text);
}

.user-response {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 14px 16px;
  font-size: 14px;
  line-height: 1.6;
  color: var(--text);
  animation: slideIn 0.2s ease;
  align-self: flex-end;
  max-width: 90%;
}

.complete-card {
  background: var(--pass);
  color: white;
  border-radius: 16px;
  padding: 28px 20px;
  text-align: center;
  animation: slideIn 0.3s ease;
}

.complete-card h2 { font-size: 22px; font-weight: 700; margin-bottom: 10px; }
.complete-card p { font-size: 14px; opacity: 0.85; line-height: 1.6; }

.message-card {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 16px 18px;
  font-size: 14px;
  line-height: 1.6;
  animation: slideIn 0.3s ease;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Input area ── */
.input-area {
  flex-shrink: 0;
  padding: 12px 20px 24px;
  border-top: 1px solid var(--border);
  background: var(--bg);
}

textarea {
  width: 100%;
  border: 2px solid var(--border);
  border-radius: 14px;
  padding: 14px 16px;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  background: var(--card);
  resize: none;
  outline: none;
  min-height: 52px;
  max-height: 140px;
  line-height: 1.5;
  color: var(--text);
  transition: border-color 0.15s;
}

textarea:focus { border-color: var(--accent); }

.send-btn {
  width: 100%;
  margin-top: 10px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 12px;
  padding: 14px;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: opacity 0.15s;
}

.send-btn:active { opacity: 0.85; }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

.next-btn {
  width: 100%;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 12px;
  padding: 14px;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: opacity 0.15s;
}

.next-btn:active { opacity: 0.85; }

.restart-btn {
  width: 100%;
  margin-top: 12px;
  background: transparent;
  color: white;
  border: 2px solid rgba(255,255,255,0.4);
  border-radius: 12px;
  padding: 12px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
}

/* Loading dots inline */
.loading {
  display: flex;
  gap: 5px;
  padding: 14px 18px;
  background: var(--card);
  border-radius: 14px;
  border: 1.5px solid var(--border);
  width: fit-content;
  animation: slideIn 0.2s ease;
}

.loading span {
  width: 7px; height: 7px;
  background: var(--muted);
  border-radius: 50%;
  animation: bounce 1.2s infinite;
}
.loading span:nth-child(2) { animation-delay: 0.2s; }
.loading span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }
</style>
</head>
<body>

<script>
// ── CONFIGURATION ──────────────────────────────────────────
const PROPERTY = "La Vista";
const NETLIFY_FN = "/.netlify/functions/Claude";

const SCENARIOS = [
  {
    id: 1,
    situation: "Estás trabajando en la casa principal. Son las 3pm, hay huéspedes adentro. Una señora se te acerca y te dice que el aire de su cuarto no enfría desde que llegaron esta mañana.\n\nEscribe el reporte que le mandarías a Carlos por WhatsApp.",
    required: ["quién reporta","recámara o cuarto específico","desde cuándo","huéspedes se quejaron","qué intentaron o si ya le hablaron a alguien"]
  },
  {
    id: 2,
    situation: "Son las 9pm. Llegan 5 personas al portón que dicen tener reservación. La reserva que Carlos te dio era para 10 personas y ya tienes 10 adentro. Estas 5 extra no estaban en la lista.\n\nEscribe el reporte que le mandarías a Carlos.",
    required: ["quién reporta","cuántas personas extra","qué hora es","qué hicieron — las dejaron entrar o no","qué necesitan que decida Carlos"]
  },
  {
    id: 3,
    situation: "Se fue la luz en toda la casa. Son las 7pm, hay huéspedes. Te asomas afuera y ves que los vecinos sí tienen luz.\n\nEscribe el reporte.",
    required: ["quién reporta","solo en la casa o general","si los vecinos tienen luz","si los huéspedes ya se quejaron","qué revisaron — tablero, breakers"]
  },
  {
    id: 4,
    situation: "Miguel vino hoy a arreglar la fuga de la tarja de la cocina. Te dijo que ya quedó y se fue. No te cobró nada, dijo que le hablen a Carlos para el pago.\n\nEscribe el reporte.",
    required: ["quién reporta","qué arregló Miguel","si quedó bien o no","que no cobró","cuánto crees que fue o que hay que preguntarle a Carlos"]
  },
  {
    id: 5,
    situation: "Los huéspedes se acaban de ir. Estás limpiando la alberca y encuentras un vaso de vidrio roto en el fondo. La casa está vacía.\n\nEscribe el reporte.",
    required: ["quién reporta","qué encontraron exactamente","dónde exactamente","si hay foto","si necesitan algo de Carlos o solo están informando"]
  }
];

const SYSTEM_PROMPT = `Eres un entrenador que evalúa reportes de empleados de "${PROPERTY}".

Un reporte completo incluye:
1. Quién reporta
2. Qué pasó exactamente (específico, no vago)
3. Dónde exactamente
4. Cuándo ocurrió
5. Quién estuvo involucrado
6. Si los huéspedes se quejaron (cuando aplica)
7. Qué ya intentaron
8. Si hay foto (cuando es algo físico)
9. Qué necesitan del dueño Carlos

Cuando evalúes un reporte:
- Si tiene toda la información necesaria: apruébalo con un comentario breve y positivo.
- Si le falta información: di EXACTAMENTE qué falta en una sola oración directa. No des la respuesta correcta. No hagas listas largas. Solo di qué es lo más importante que falta.

Responde SOLO en JSON. Sin markdown. Sin texto libre.

Si el reporte está completo:
{"passed": true, "feedback": "una línea de qué estuvo bien"}

Si falta información:
{"passed": false, "feedback": "exactamente qué falta y por qué importa — máximo 2 oraciones"}`;
</script>

<div class="header">
  <div class="header-top">
    <div class="header-title">Entrenamiento La Vista</div>
    <div class="scenario-pill" id="pill">Inicio</div>
  </div>
  <div class="progress-dots" id="progress-dots"></div>
</div>

<div class="main" id="main"></div>

<div class="input-area" id="input-area"></div>

<script>
let currentScenario = 0;
let busy = false;

// ── Progress ──────────────────────────────────────────────
function buildDots() {
  const d = document.getElementById('progress-dots');
  d.innerHTML = '';
  SCENARIOS.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'pdot';
    dot.id = `dot-${i}`;
    d.appendChild(dot);
  });
}

function updateDots(active) {
  SCENARIOS.forEach((_, i) => {
    const dot = document.getElementById(`dot-${i}`);
    if (!dot) return;
    dot.className = 'pdot' + (i < active ? ' done' : i === active ? ' active' : '');
  });
  const pill = document.getElementById('pill');
  if (active >= SCENARIOS.length) {
    pill.textContent = '✓ Completo';
  } else {
    pill.textContent = `${active + 1} / ${SCENARIOS.length}`;
  }
}

// ── DOM helpers ───────────────────────────────────────────
function scrollMain() {
  requestAnimationFrame(() => requestAnimationFrame(() => {
    const m = document.getElementById('main');
    m.scrollTop = m.scrollHeight;
  }));
}

function clearInput() { document.getElementById('input-area').innerHTML = ''; }

function addCard(html, cls) {
  const m = document.getElementById('main');
  const div = document.createElement('div');
  div.className = cls;
  div.innerHTML = html;
  m.appendChild(div);
  scrollMain();
  return div;
}

function showLoading() {
  const m = document.getElementById('main');
  const d = document.createElement('div');
  d.className = 'loading'; d.id = 'loading';
  d.innerHTML = '<span></span><span></span><span></span>';
  m.appendChild(d); scrollMain();
}
function hideLoading() { const l = document.getElementById('loading'); if(l) l.remove(); }

function showTextInput(ph) {
  clearInput();
  const area = document.getElementById('input-area');
  const ta = document.createElement('textarea');
  ta.placeholder = ph || 'Escribe tu reporte...';
  ta.id = 'report-input';
  ta.oninput = () => { ta.style.height='auto'; ta.style.height=Math.min(ta.scrollHeight,140)+'px'; };

  const btn = document.createElement('button');
  btn.className = 'send-btn';
  btn.textContent = 'Enviar reporte';
  btn.onclick = () => {
    if (busy) return;
    const v = ta.value.trim();
    if (!v) return;
    submitReport(v);
  };

  ta.onkeydown = e => { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault(); btn.onclick();} };

  area.appendChild(ta); area.appendChild(btn);
  setTimeout(() => ta.focus(), 150);
  scrollMain();
}

function showNextBtn(label, fn) {
  clearInput();
  const area = document.getElementById('input-area');
  const btn = document.createElement('button');
  btn.className = 'next-btn';
  btn.textContent = label;
  btn.onclick = fn;
  area.appendChild(btn);
}

// ── Flow ──────────────────────────────────────────────────
function start() {
  document.getElementById('main').innerHTML = '';
  clearInput();
  currentScenario = 0;
  buildDots();
  updateDots(0);

  addCard(`
    <strong>Bienvenido al entrenamiento de reportes.</strong><br><br>
    Vas a ver 5 situaciones reales que pasan en La Vista. Para cada una vas a escribir el reporte como si se lo mandaras a Carlos por WhatsApp.<br><br>
    Si falta información, te voy a decir exactamente qué faltó y lo intentas de nuevo.
  `, 'message-card');

  showNextBtn('Empezar →', showCurrentScenario);
}

function showCurrentScenario() {
  if (currentScenario >= SCENARIOS.length) { showComplete(); return; }
  const s = SCENARIOS[currentScenario];
  updateDots(currentScenario);

  addCard(`
    <div class="scenario-label">Escenario ${s.id} de ${SCENARIOS.length}</div>
    <div class="scenario-text">${s.situation.replace(/\n/g,'<br>')}</div>
  `, 'scenario-card');

  showTextInput('Escribe tu reporte como lo mandarías por WhatsApp...');
}

async function submitReport(text) {
  busy = true;

  // Show user response
  const userDiv = document.createElement('div');
  userDiv.className = 'user-response';
  userDiv.textContent = text;
  document.getElementById('main').appendChild(userDiv);
  scrollMain();

  clearInput();
  showLoading();

  const s = SCENARIOS[currentScenario];
  const userMsg = `Escenario: "${s.situation}"\n\nReporte del empleado: "${text}"\n\nInformación requerida para este escenario: ${s.required.join(', ')}`;

  try {
    const res = await fetch(NETLIFY_FN, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system: SYSTEM_PROMPT,
        messages: [{ role: 'user', content: userMsg }]
      })
    });

    const data = await res.json();
    const raw = data?.content?.[0]?.text || '';
    hideLoading();
    busy = false;

    let parsed;
    try {
      parsed = JSON.parse(raw.replace(/```json|```/g,'').trim());
    } catch(e) {
      // Fallback: show raw text as feedback
      addCard(`<div class="feedback-label">Revisión</div><div class="feedback-text">${raw}</div>`, 'feedback-card fail');
      showTextInput('Inténtalo de nuevo...');
      return;
    }

    if (parsed.passed) {
      addCard(`
        <div class="feedback-label">✓ Aprobado</div>
        <div class="feedback-text">${parsed.feedback}</div>
      `, 'feedback-card pass');

      currentScenario++;
      updateDots(currentScenario);

      if (currentScenario >= SCENARIOS.length) {
        setTimeout(showComplete, 600);
      } else {
        showNextBtn(`Siguiente escenario →`, showCurrentScenario);
      }
    } else {
      addCard(`
        <div class="feedback-label">⚠ Falta información</div>
        <div class="feedback-text">${parsed.feedback}</div>
      `, 'feedback-card fail');
      showTextInput('Inténtalo de nuevo...');
    }

  } catch(e) {
    hideLoading();
    busy = false;
    addCard(`<div class="feedback-label">Error</div><div class="feedback-text">No se pudo conectar. Intenta de nuevo.</div>`, 'feedback-card fail');
    showTextInput('Inténtalo de nuevo...');
  }
}

function showComplete() {
  clearInput();
  const m = document.getElementById('main');
  updateDots(SCENARIOS.length);

  const card = document.createElement('div');
  card.className = 'complete-card';
  card.innerHTML = `
    <h2>Entrenamiento completado</h2>
    <p>Ya sabes qué información necesita Carlos para poder actuar. Un reporte completo le ahorra tiempo a todos.</p>
  `;
  m.appendChild(card);

  const area = document.getElementById('input-area');
  area.innerHTML = '';
  const btn = document.createElement('button');
  btn.className = 'restart-btn';
  btn.style.cssText = 'width:100%;margin-top:0;background:transparent;color:#16a34a;border:2px solid #86efac;border-radius:12px;padding:12px;font-family:DM Sans,sans-serif;font-size:14px;font-weight:600;cursor:pointer;';
  btn.textContent = 'Practicar de nuevo';
  btn.onclick = start;
  area.appendChild(btn);
  scrollMain();
}

start();
</script>
</body>
</html>
